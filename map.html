function openInGoogleEarth(layer) {
    if (!layer || !layer.getBounds) {
        alert("خطأ في الاحداثيات");
        return;
    }
    const center = layer.getBounds().getCenter();
    const lat = center.lat;
    const lng = center.lng;
    const googleEarthUrl = `https://earth.google.com/web/search/${lat},${lng}`;
    window.open(googleEarthUrl, 'googleEarthWindow');
}
        function toggleAdminPanel() {
            const panel = document.getElementById('admin-panel');
            const btn = document.getElementById('toggle-panel-btn');
            panel.classList.toggle('hidden');
            if(panel.classList.contains('hidden')) {
                btn.innerText = '◀';
            } else {
                btn.innerText = '▶';
            }
            setTimeout(() => { map.invalidateSize(); }, 300); 
        }
        async function scanKmlFolderAndLoad() {
            try {
                const response = await fetch('lib/kmls/');
                if (!response.ok) throw new Error("لا يمكن قراءة المجلد مباشرة");
                const text = await response.text();

async function importFromExcel() {
    const token = prompt("الرجاء إدخال رمز المرور:");

        const worksheet = workbook.Sheets[workbook.SheetNames[0]];
        const excelRows = XLSX.utils.sheet_to_json(worksheet);

        function applyLayerStylesAndEvents(layer, p, parentLayer) {
            const isSold = p.status === 'sold';
            if (layer instanceof L.Polygon || layer instanceof L.Polyline) {
                layer.setStyle({
                    color: isSold ? '#aa1e1e' : '#d4af37',
                    weight: 3,
                    fillColor: isSold ? '#aa1e1e' : '#111111',
                    fillOpacity: 0.45, 
                    fill: true 
                });
                layer.propertyId = p.id;
                layer.customData = p;
                allLandsLayers.push(layer);
                const centerLatLng = layer.getBounds().getCenter();
                const cleanPin = L.marker(centerLatLng, {
    icon: pinIcons[p.regionType] || pinIcons.sakani
});
                const openDetails = () => showPropertyDetails(p, layer);
                layer.on('click', openDetails);
                cleanPin.on('click', openDetails);
                parentLayer.addLayer(cleanPin);
            }
        }

            const offset = (properties.indexOf(p) * 0.002);

    icon: pinIcons[p.regionType] || pinIcons.sakani

        ['zrai', 'زراعي'],
        ['sakanitgary', 'سكني | تجاري']
    ];

    bar.innerHTML = '';

    usages.forEach(item => {

  

        const chip = document.createElement('div');

        chip.className =
            `filter-chip2 ${selectedUsageFilter === item[0] ? 'active' : ''}`;

        chip.innerHTML = `${item[1]} `;

        chip.onclick = () => {
            selectedUsageFilter = item[0];
            updateUI();
        };

        bar.appendChild(chip);
    });
}
    </script>
